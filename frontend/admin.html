<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop #6 File Upload</title>
  <link rel="stylesheet" href="./style/admin.css" />
</head>

<body>
  <div style="padding-left: 10px; display: flex; justify-content: space-between; align-items: center;">
    <div>
      <h1>
        Welcome Admin (<span style="color: #7f8eca; font-weight: bold" id="user"></span>)
      </h1>
    </div>
    <div>
      <button onclick="logout()"
        style="padding: 10px 20px; background-color: #f44336; color: white; border: none; cursor: pointer; border-radius: 5px; margin-right: 10px;">
        Logout
      </button>
    </div>
  </div>

 <div style=" gap: 10px; padding: 20px; height: 80vh; text-align: center;">
        <div
            style="border: 2px solid rgb(192, 192, 192); width: 50%; border-radius: 10px; box-shadow: 0.1px 0.1px 5px; overflow: hidden;">
            <div class="upload-section" style="padding: 24px;">
                <h2 style="margin: 0 0 20px 0; font-size: 18px;">📤 Upload & Send File</h2>

                <!-- Drop Zone -->
                <label id="dropZone" for="fileInput" style="
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                    border: 2px dashed #a5b4fc;
                    border-radius: 12px;
                    padding: 28px 16px;
                    background: #f5f3ff;
                    cursor: pointer;
                    transition: all 0.2s;
                    min-height: 120px;
                    text-align: center;
                " ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                    <span style="font-size: 32px;">📁</span>
                    <span style="font-weight: 600; color: #4f46e5;">คลิกเพื่อเลือกไฟล์</span>
                    <span style="font-size: 12px; color: #888;">หรือลากวางไฟล์ที่นี่</span>
                    <input type="file" id="fileInput" style="display:none" />
                </label>

                <!-- File Preview -->
                <div id="filePreviewArea" style="display:none; margin-top: 12px; padding: 10px 14px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; display:none; align-items:center; gap:10px;">
                    <span id="filePreviewIcon" style="font-size: 24px;">📄</span>
                    <div style="flex:1; text-align:left; overflow:hidden;">
                        <div id="filePreviewName" style="font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                        <div id="filePreviewSize" style="font-size:11px; color:#888;"></div>
                    </div>
                    <button onclick="clearFileInput()" style="background:none; border:none; color:#f44336; cursor:pointer; font-size:18px; line-height:1;">✕</button>
                </div>

                <!-- Upload Button -->
                <button onclick="uploadFile(event)" style="
                    margin-top: 16px;
                    width: 100%;
                    padding: 11px;
                    background: linear-gradient(135deg, #6366f1, #8b5cf6);
                    color: white;
                    border: none;
                    border-radius: 10px;
                    font-size: 15px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: opacity 0.2s;
                " onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">

                    ⬆️ อัปโหลดไฟล์
                </button>

                <div id="uploadStatus" style="margin-top: 10px; font-size: 13px; text-align:center; min-height:20px;"></div>
            </div>
        </div>

    <div
      style="border: 2px solid rgb(192, 192, 192); width: 100%; border-radius: 10px; box-shadow: 0.1px 0.1px 5px; margin-top: 20px; padding: 20px; box-sizing: border-box;">
      <p id="uploadStatus"></p>
      <h3>Files on Server</h3>

      <div style="margin-bottom: 15px;">
        <input type="text" id="searchBox" placeholder="Search by filename..." onkeyup="searchFiles()"
          style="padding: 8px; width: 80%; max-width: 300px; border-radius: 4px; border: 1px solid #ccc;" />
      </div>

      <div id="fileListContainer" style="text-align: left; padding: 10px;"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
